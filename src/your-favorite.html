<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sở thích của bạn</title>
    <link rel="stylesheet" href="your-favorite.css">
</head>

<body>

<div class="container">

    <div class="title">SỞ THÍCH CỦA BẠN</div>

    <form>

        <div class="form-group">
            <label>Họ và tên</label>
            <input type="text" name="fullName">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email">
        </div>

        <div class="form-group">
            <label class="title-hobbies">Sở thích</label>

            <div class="hobbies">
                <label><input type="checkbox" name="hobby"> Thể thao</label>
                <label><input type="checkbox" name="hobby"> Âm nhạc</label>
                <label><input type="checkbox" name="hobby"> Đọc sách</label>

                <br><br>

                <label><input type="checkbox" name="hobby"> Lướt web</label>
                <label><input type="checkbox" name="hobby"> Chơi game</label>
                <label><input type="checkbox" name="hobby"> Điện ảnh</label>

                <br><br>

                <label><input type="checkbox" name="hobby"> Du lịch</label>

            </div>

        </div>

        <div class="buttons">
            <button type="submit">Gửi thông tin</button>
            <button type="reset">Nhập lại</button>
        </div>

    </form>

</div>

</body>
</html>
