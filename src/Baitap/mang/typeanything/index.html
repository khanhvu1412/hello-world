<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Type Slowly</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        textarea {
            width: 400px;
            height: 200px;
            font-size: 18px;
        }
    </style>
</head>
<body>

<h2>Type anything slowly</h2>

<textarea id="text" onkeydown="typeSlowly()"></textarea>
</body>
<script src="script.js"></script>
</html>
