<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kiểm tra ngày</title>
</head>
<body>
<h1>Kiểm tra ngày</h1>

<input id="month">
<button onclick="tinhSoNgay()">Tính số ngày</button>
<p id="result"></p>
<script>

    function tinhSoNgay() {
        let month = Number(document.getElementById("month").value)
        let result;

        switch (month) {
            case 1:
            case 3:
            case 5:
            case 7:
            case 8:
            case 10:
            case 12:
                result = "Tháng " + month + " có 31 ngày";
                break;
            case 4:
            case 6:
            case 9:
            case 11:
                result = "Tháng " + month + " có 30 ngày";
                break;
            case 2:
                result = "Tháng " + month + "có 28 hoặc 29 ngày";
                break;
            default:
                result = "Tháng không hợp lệ";
        }

        document.getElementById("result").innerHTML = result;
    }
</script>
</body>
</html>
