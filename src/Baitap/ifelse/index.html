<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Toggle UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="item">
        <label class="switch good">
            <input type="checkbox">
            <span class="slider"></span>
        </label>
        <span class="label-text">GOOD</span>
    </div>

    <div class="item">
        <label class="switch cheap">
            <input type="checkbox">
            <span class="slider"></span>
        </label>
        <span class="label-text">CHEAP</span>
    </div>

    <div class="item">
        <label class="switch fast">
            <input type="checkbox">
            <span class="slider"></span>
        </label>
        <span class="label-text">FAST</span>
    </div>

</div>

</body>
<script src="script.js"></script>
</html>
