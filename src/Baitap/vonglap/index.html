    // Kiểm tra số nguyên tố
    let num = Number(prompt("Nhập số cần kiểm tra: "));
    let count = 0;
    let N = 2;

    let result = "";

    while (count < num) {
        let isPrime = true;

        for (let i = 2; i <= Math.sqrt(N); i++) {
            if (N % i === 0) {
                isPrime = false;
                break;
            }
        }

        if (isPrime) {
            result += N + " ";
            count++;
        }
        N++;
    }

    document.getElementById("result").innerHTML = result;


</script>
