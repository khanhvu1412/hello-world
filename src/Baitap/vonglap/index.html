<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vòng lặp</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        td {
            border: 1px solid #999;
            padding: 8px;
            text-align: left;
        }
    </style>
</head>
<body>
<h1>Vòng lặp</h1>
<div id="result"></div>
</body>
<script>
    // Bảng cửu chương
    let table = "<table>";

    for (let i = 1; i <= 10; i++) {
        table += "<tr>";

        for (let j = 2; j <= 10; j++) {
            table += "<td>" + j + "x" + i + "=" + (j * i) + "</td>";
        }

        table += "</tr>";
    }

    table += "</table>";
    document.getElementById("result").innerHTML = table

</script>
</html>
